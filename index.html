<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Census Datawheel HUD</title>
  <style>
    :root {
      --bg-1: #060b1a;
      --bg-2: #0a1024;
      --glass: rgba(120, 210, 255, 0.08);
      --glass-border: rgba(120, 210, 255, 0.28);
      --neon: #3dd7ff;
      --neon-2: #7bf4ff;
      --text: #dff8ff;
      --muted: #8fb2c8;
      --ok: #70ffbf;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 225, 255, 0.16), transparent 35%),
        radial-gradient(circle at 80% 85%, rgba(0, 120, 255, 0.18), transparent 40%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .hud {
      width: min(1220px, 100%);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(160deg, rgba(11, 26, 44, 0.72), rgba(8, 18, 34, 0.62));
      backdrop-filter: blur(16px) saturate(130%);
      -webkit-backdrop-filter: bl
      
      ur(16px) saturate(130%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 0 60px rgba(0, 185, 255, 0.2),
        0 20px 80px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(114, 206, 255, 0.22);
      background: rgba(10, 24, 40, 0.48);
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--neon-2);
      text-shadow: 0 0 14px rgba(61, 215, 255, 0.65);
    }

    .toggle {
      position: relative;
      display: inline-grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid rgba(114, 206, 255, 0.35);
      background: rgba(6, 18, 34, 0.68);
      box-shadow: 0 0 28px rgba(61, 215, 255, 0.2) inset;
    }

    .view-toggle {
      position: relative;
      display: inline-grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid rgba(114, 206, 255, 0.35);
      background: rgba(6, 18, 34, 0.68);
      box-shadow: 0 0 22px rgba(61, 215, 255, 0.16) inset;
    }

    .view-toggle button {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--muted);
      background: transparent;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .view-toggle button.active {
      color: #021523;
      background: linear-gradient(120deg, var(--neon), var(--neon-2));
      box-shadow: 0 0 16px rgba(61, 215, 255, 0.5);
    }

    .toggle button {
      position: relative;
      z-index: 2;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      padding: 8px 18px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: color 220ms ease;
    }

    .toggle button.active {
      color: #031425;
      text-shadow: none;
    }

    .pill {
      position: absolute;
      top: 6px;
      left: 6px;
      width: calc(50% - 6px);
      height: calc(100% - 12px);
      border-radius: 999px;
      background: linear-gradient(120deg, var(--neon), var(--neon-2));
      box-shadow: 0 0 20px rgba(61, 215, 255, 0.55);
      transition: transform 240ms ease;
    }

    .content {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      padding: 18px;
      min-height: 620px;
    }

    .panel {
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0, 180, 255, 0.16) inset;
    }

    .wheel-wrap {
      position: relative;
      padding: 16px;
      overflow: hidden;
    }

    .wheel-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    #wheelSvg {
      width: 100%;
      height: 560px;
      display: block;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    #mapSvg {
      width: 100%;
      height: 560px;
      display: none;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    .map-tooltip {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -120%);
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 120ms ease;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(6, 20, 36, 0.9);
      border: 1px solid rgba(114, 206, 255, 0.42);
      color: #dff8ff;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 0 14px rgba(61, 215, 255, 0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .detail {
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 12px;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8eeeff;
      text-shadow: 0 0 10px rgba(111, 230, 255, 0.45);
    }

    .state-select {
      width: 100%;
      color: var(--text);
      border: 1px solid rgba(114, 206, 255, 0.38);
      background: rgba(3, 16, 30, 0.76);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      border: 1px solid rgba(114, 206, 255, 0.24);
      background: rgba(8, 24, 42, 0.66);
      border-radius: 14px;
      padding: 11px 12px;
      min-height: 88px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .value {
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #f1fcff;
      text-shadow: 0 0 14px rgba(61, 215, 255, 0.3);
      line-height: 1.1;
    }

    .delta {
      margin-top: 3px;
      font-size: 11px;
      color: var(--ok);
    }

    .badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      letter-spacing: 0.04em;
      padding: 3px 6px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .badge-high {
      color: #95ffd2;
      border-color: rgba(112, 255, 191, 0.45);
      background: rgba(112, 255, 191, 0.12);
    }

    .badge-low {
      color: #ffafaf;
      border-color: rgba(255, 133, 133, 0.45);
      background: rgba(255, 133, 133, 0.12);
    }

    .badge-near {
      color: #8fd3ea;
      border-color: rgba(143, 211, 234, 0.4);
      background: rgba(143, 211, 234, 0.1);
    }

    .us-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .us-card .value {
      font-size: 20px;
    }

    .legend {
      border-top: 1px dashed rgba(114, 206, 255, 0.35);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .scale-legend {
      margin-top: 8px;
    }

    .scale-bar {
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(114, 206, 255, 0.35);
      background: linear-gradient(90deg, rgba(29, 95, 130, 0.9), rgba(120, 230, 255, 0.95));
      box-shadow: 0 0 12px rgba(61, 215, 255, 0.2) inset;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-top: 4px;
      color: #9bc6db;
    }

    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-right: 6px;
      background: var(--neon);
      box-shadow: 0 0 12px rgba(61, 215, 255, 0.9);
    }

    @media (max-width: 1050px) {
      .content {
        grid-template-columns: 1fr;
      }
      #wheelSvg {
        height: 480px;
      }
    }

    @keyframes activePulse {
      0% {
        filter: drop-shadow(0 0 8px rgba(176, 244, 255, 0.62));
      }
      50% {
        filter: drop-shadow(0 0 18px rgba(176, 244, 255, 0.98));
      }
      100% {
        filter: drop-shadow(0 0 8px rgba(176, 244, 255, 0.62));
      }
    }

    @keyframes activePulseStrong {
      0% {
        filter: drop-shadow(0 0 8px rgba(176, 244, 255, 0.58));
      }
      50% {
        filter: drop-shadow(0 0 28px rgba(176, 244, 255, 1));
      }
      100% {
        filter: drop-shadow(0 0 8px rgba(176, 244, 255, 0.58));
      }
    }
  </style>
</head>
<body>
  <main class="hud">
    <header class="topbar">
      <div class="title">Census Datawheel // Cyber HUD</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div class="view-toggle" id="viewToggle">
          <button class="active" data-view="wheel">Wheel</button>
          <button data-view="map">Map</button>
        </div>
        <div class="toggle" id="groupToggle">
          <span class="pill" id="pill"></span>
          <button class="active" data-group="total">Total</button>
          <button data-group="asian">Asian</button>
        </div>
      </div>
    </header>

    <section class="content">
      <article class="panel wheel-wrap">
        <div class="wheel-meta">
          <span id="wheelTitle">ALL STATES / Equal Width (Total)</span>
          <span id="viewHint">Click arc to inspect</span>
        </div>
        <svg id="wheelSvg" viewBox="0 0 560 560" aria-label="Data wheel chart"></svg>
        <svg id="mapSvg" viewBox="0 0 560 560" aria-label="US map chart"></svg>
        <div id="mapTooltip" class="map-tooltip"></div>
      </article>

      <aside class="panel detail">
        <select class="state-select" id="stateSelect"></select>

        <div class="section-title">United States Overview</div>
        <div class="us-stats" id="usStats"></div>

        <div class="section-title">Selected State Detail</div>
        <div class="stats" id="stats"></div>

        <div class="legend">
          <div><span class="dot"></span><strong>Source:</strong> `wheel data.csv` (local)</div>
          <div><strong>Mode:</strong> <span id="modeText">Total</span></div>
          <div><strong>Note:</strong> 우측 숫자는 토글 전환 시 애니메이션으로 갱신됩니다.</div>
          <div class="scale-legend">
            <div><strong>Color Scale:</strong> Population intensity</div>
            <div class="scale-bar" id="scaleBar"></div>
            <div class="scale-labels"><span>Low</span><span>High</span></div>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="https://unpkg.com/d3-geo@3"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

      modeText: document.getElementById("modeText")
    };

    const state = {
      mode: "total",
      selectedState: "Alabama",
      dataByState: {},
      states: [],
      wheelRotation: 0,
      hoveredState: null,
      view: "wheel",
      usGeoFeatures: null
    };

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const c = text[i];
        if (c === '"') {
          if (inQuotes && text[i + 1] === '"') {
            cell += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (c === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((c === "\n" || c === "\r") && !inQuotes) {
          if (c === "\r" && text[i + 1] === "\n") i += 1;
          row.push(cell);
          if (row.some((x) => x.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += c;
        }
      }
      if (cell.length || row.length) {
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    function normalizeLabel(label) {
      return label.replace(/\u00a0/g, " ").replace(/\s+/g, " ").trim();
    }

    function toNumber(raw) {
      if (raw == null) return NaN;
      const txt = String(raw).trim().replace(/,/g, "").replace(/\$/g, "").replace(/%/g, "");
      if (!txt) return NaN;
      return Number(txt);
    }

    function formatValue(type, value) {
      if (!Number.isFinite(value)) return "-";
      if (type === "currency") return "$" + Math.round(value).toLocaleString();
      if (type === "percent") return value.toFixed(1).replace(/\.0$/, "") + "%";
      if (type === "float1") return value.toFixed(1).replace(/\.0$/, "");
      return Math.round(value).toLocaleString();
    }

    function formatCompact(type, value) {
      if (!Number.isFinite(value)) return "-";
      if (type === "currency") {
        if (value >= 1e6) return "$" + (value / 1e6).toFixed(1) + "M";
        return "$" + Math.round(value / 1000) + "K";
      }
      if (type === "percent") return value.toFixed(1).replace(/\.0$/, "") + "%";
      if (value >= 1e6) return (value / 1e6).toFixed(1) + "M";
      return Math.round(value / 1000) + "K";
    }

    function buildData(rows) {
      const headers = rows[0] || [];
      const map = {};
      for (let c = 1; c < headers.length; c += 1) {
        const h = (headers[c] || "").trim();
        const match = h.match(/^(.*?)!!(Total population|Asian alone)!!Estimate$/);
        if (!match) continue;
        const st = match[1].trim();
        const group = match[2] === "Asian alone" ? "asian" : "total";
        map[c] = { st, group };
      }

      const byState = {};
      rows.slice(1).forEach((r) => {
        const metric = normalizeLabel(r[0] || "");
        Object.entries(map).forEach(([idx, info]) => {
          const i = Number(idx);
          const raw = (r[i] || "").trim();
          if (!byState[info.st]) byState[info.st] = {};
          if (!byState[info.st][metric]) byState[info.st][metric] = {};
          byState[info.st][metric][info.group] = toNumber(raw);
        });
      });

      return byState;
    }

    function createArcPath(cx, cy, r0, r1, a0, a1) {
      const p = (r, a) => [cx + r * Math.cos(a), cy + r * Math.sin(a)];
      const [x0, y0] = p(r1, a0);
      const [x1, y1] = p(r1, a1);
      const [x2, y2] = p(r0, a1);
      const [x3, y3] = p(r0, a0);
      const large = a1 - a0 > Math.PI ? 1 : 0;
      return `M ${x0} ${y0} A ${r1} ${r1} 0 ${large} 1 ${x1} ${y1} L ${x2} ${y2} A ${r0} ${r0} 0 ${large} 0 ${x3} ${y3} Z`;
    }

    function normalizeAngle(a) {
      let x = a;
      while (x <= -Math.PI) x += Math.PI * 2;
      while (x > Math.PI) x -= Math.PI * 2;
      return x;
    }

    function modeCenterColor() {
      return state.mode === "asian" ? "#ffd972" : "#6fe6ff";
    }

    function updateCenterTexts() {
      const centerUS = document.getElementById("centerUS");
      const centerHover = document.getElementById("centerHover");
      const centerMeta = document.getElementById("centerMeta");
      if (!centerUS || !centerHover || !centerMeta) return;
      const usTotal = state.dataByState["United States"]?.["Total population"]?.total;
      centerUS.textContent = formatValue("int", usTotal);
      centerHover.textContent = state.hoveredState || "";
      const selectedVal = state.dataByState[state.selectedState]?.["Total population"]?.[state.mode];
      centerMeta.textContent = `${state.selectedState} · ${formatCompact("int", selectedVal)}`;
    }

    function selectState(nextState, withRotation = true) {
      state.selectedState = nextState;
      if (el.stateSelect.value !== nextState) {
        el.stateSelect.value = nextState;
      }
      renderDetail();
      if (state.view === "wheel") {
        renderWheel();
        if (withRotation) rotateToState(nextState);
      } else {
        renderMap();
      }
    }

    function getStateAbbreviation(fullName) {
      return STATE_ABBR_MAP[fullName] || fullName.slice(0, 2).toUpperCase();
    }

    function updateScaleLegend() {
      const left = state.mode === "asian"
        ? "rgba(98, 74, 16, 0.95)"
        : "rgba(29, 95, 130, 0.9)";
      const right = state.mode === "asian"
        ? "rgba(255, 215, 114, 0.96)"
        : "rgba(120, 230, 255, 0.95)";
      el.scaleBar.style.background = `linear-gradient(90deg, ${left}, ${right})`;
    }

    function showMapTooltip(name, value, evt) {
      el.mapTooltip.innerHTML = `<strong>${name}</strong><br>${formatValue("int", value)}`;
      moveMapTooltip(evt);
      el.mapTooltip.style.opacity = "1";
    }

    function moveMapTooltip(evt) {
      const rect = el.wheelWrap.getBoundingClientRect();
      const x = evt.clientX - rect.left;
      const y = evt.clientY - rect.top;
      el.mapTooltip.style.left = `${x}px`;
      el.mapTooltip.style.top = `${y - 6}px`;
    }

    function hideMapTooltip() {
      el.mapTooltip.style.opacity = "0";
    }

    function rotateToState(targetState, duration = 680) {
      const data = state.states
        .filter((s) => s !== "United States")
        .sort((a, b) => a.localeCompare(b))
        .map((name) => ({ name }));
      const idx = data.findIndex((d) => d.name === targetState);
      if (idx < 0) return;

      const slice = (Math.PI * 2) / Math.max(data.length, 1);
      const baseStart = -Math.PI / 2;
      const mid = baseStart + idx * slice + slice / 2;
      const target = -Math.PI / 2 - mid;
      const start = state.wheelRotation;
      const delta = normalizeAngle(target - start);
      const end = start + delta;
      const started = performance.now();

      function tick(now) {
        const t = Math.min(1, (now - started) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        state.wheelRotation = start + (end - start) * eased;
        renderWheel();
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function renderWheel() {
      const modeLabel = state.mode === "asian" ? "Asian" : "Total";
      el.modeText.textContent = modeLabel;
      el.wheelTitle.textContent = `ALL STATES / Equal Width (${modeLabel})`;

      const data = state.states
        .filter((s) => s !== "United States")
        .map((s) => ({
          name: s,
          value: state.dataByState[s]?.["Total population"]?.[state.mode] || 0
        }))
        .sort((a, b) => a.name.localeCompare(b.name));

      const equalSliceAngle = (Math.PI * 2) / Math.max(data.length, 1);
      const padAngle = 0.008;
      const minValue = Math.min(...data.map((d) => d.value));
      const maxValue = Math.max(...data.map((d) => d.value));
      const spread = Math.max(1, maxValue - minValue);

      const svg = el.wheelSvg;
      svg.innerHTML = "";
      const ns = "http://www.w3.org/2000/svg";
      const cx = 280;
      const cy = 280;
      const inner = 116;
      const outer = 232;
      let angle = -Math.PI / 2;
      const wheelGroup = document.createElementNS(ns, "g");
      wheelGroup.setAttribute("transform", `rotate(${(state.wheelRotation * 180) / Math.PI} ${cx} ${cy})`);
      svg.appendChild(wheelGroup);

      const bgRing = document.createElementNS(ns, "circle");
      bgRing.setAttribute("cx", cx);
      bgRing.setAttribute("cy", cy);
      bgRing.setAttribute("r", ((inner + outer) / 2).toString());
      bgRing.setAttribute("fill", "none");
      bgRing.setAttribute("stroke", "rgba(71, 203, 255, 0.22)");
      bgRing.setAttribute("stroke-width", (outer - inner).toString());
      wheelGroup.appendChild(bgRing);

      data.forEach((d, i) => {
        const next = angle + equalSliceAngle;
        const arcStart = angle + padAngle / 2;
        const arcEnd = next - padAngle / 2;
        const path = document.createElementNS(ns, "path");
        path.setAttribute("d", createArcPath(cx, cy, inner, outer, arcStart, arcEnd));
        const p = (d.value - minValue) / spread;
        const hue = state.mode === "asian" ? 44 : 194;
        const sat = 58 + p * 36;
        const light = 28 + p * 30;
        const alpha = 0.2 + p * 0.65;
        const isAlabama = d.name === "Alabama";
        path.setAttribute(
          "fill",
          isAlabama
            ? `hsla(2, 96%, 42%, ${Math.max(0.72, alpha).toFixed(3)})`
            : `hsla(${hue}, ${sat}%, ${light}%, ${alpha.toFixed(3)})`
        );
        const isActive = d.name === state.selectedState;
        path.setAttribute(
          "stroke",
          isAlabama
            ? "rgba(255, 108, 108, 1)"
            : (isActive
              ? "rgba(230, 252, 255, 1)"
              : `hsla(${hue}, ${Math.min(100, sat + 14)}%, ${Math.min(88, light + 22)}%, 0.98)`)
        );
        path.setAttribute("stroke-width", isAlabama ? "3.2" : (isActive ? "2.8" : "1.5"));
        path.style.cursor = "pointer";
        path.style.filter = isAlabama
          ? `drop-shadow(0 0 ${14 + p * 12}px rgba(255, 78, 78, 0.96))`
          : (isActive
            ? `drop-shadow(0 0 ${10 + p * 12}px rgba(176, 244, 255, 0.95))`
            : `drop-shadow(0 0 ${4 + p * 8}px rgba(80,220,255,0.8))`);
        if (isAlabama) {
          path.style.animation = "activePulseStrong 1100ms ease-in-out infinite";
        } else if (isActive) {
          path.style.animation = "activePulse 1400ms ease-in-out infinite";
        } else {
          path.style.animation = "none";
        }
        path.addEventListener("click", () => {
          selectState(d.name, true);
        });
        path.addEventListener("mouseenter", () => {
          state.hoveredState = d.name;
          updateCenterTexts();
        });
        path.addEventListener("mouseleave", () => {
          state.hoveredState = null;
          updateCenterTexts();
        });
        wheelGroup.appendChild(path);

        const mid = (angle + next) / 2;
        const labelRadius = inner + (outer - inner) * 0.53;
        const tx = cx + labelRadius * Math.cos(mid);
        const ty = cy + labelRadius * Math.sin(mid);
        const text = document.createElementNS(ns, "text");
        text.setAttribute("x", tx.toFixed(1));
        text.setAttribute("y", ty.toFixed(1));
        text.setAttribute(
          "fill",
          isAlabama
            ? "rgba(255, 236, 236, 1)"
            : (isActive ? "rgba(245, 255, 255, 1)" : "rgba(214, 252, 255, 0.98)")
        );
        text.setAttribute("font-size", "10");
        text.setAttribute("font-family", "Consolas, 'Courier New', monospace");
        text.setAttribute("font-weight", "700");
        text.style.pointerEvents = "none";
        text.style.textShadow = "0 0 8px rgba(129, 240, 255, 0.8)";
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "middle");
        text.textContent = getStateAbbreviation(d.name);
        wheelGroup.appendChild(text);

        angle = next;
      });

      const center = document.createElementNS(ns, "circle");
      center.setAttribute("cx", cx);
      center.setAttribute("cy", cy);
      center.setAttribute("r", "96");
      center.setAttribute("fill", "rgba(9, 28, 50, 0.86)");
      center.setAttribute("stroke", modeCenterColor());
      center.setAttribute("stroke-width", "1.5");
      center.style.filter = "drop-shadow(0 0 18px rgba(61,215,255,0.5))";
      svg.appendChild(center);

      const centerT = document.createElementNS(ns, "text");
      centerT.setAttribute("x", cx);
      centerT.setAttribute("y", cy - 14);
      centerT.setAttribute("fill", modeCenterColor());
      centerT.setAttribute("font-size", "12");
      centerT.setAttribute("text-anchor", "middle");
      centerT.setAttribute("letter-spacing", "1.6");
      centerT.textContent = modeLabel.toUpperCase();
      svg.appendChild(centerT);

      const centerV = document.createElementNS(ns, "text");
      centerV.setAttribute("x", cx);
      centerV.setAttribute("y", cy + 6);
      centerV.setAttribute("fill", "#e8fbff");
      centerV.setAttribute("font-size", "22");
      centerV.setAttribute("font-weight", "700");
      centerV.setAttribute("font-family", "Consolas, 'Courier New', monospace");
      centerV.setAttribute("text-anchor", "middle");
      centerV.setAttribute("letter-spacing", "0.8");
      centerV.setAttribute("id", "centerUS");
      const usTotal = state.dataByState["United States"]?.["Total population"]?.total;
      centerV.textContent = formatValue("int", usTotal);
      svg.appendChild(centerV);

      const centerSub = document.createElementNS(ns, "text");
      centerSub.setAttribute("x", cx);
      centerSub.setAttribute("y", cy + 30);
      centerSub.setAttribute("fill", "rgba(181, 224, 243, 0.95)");
      centerSub.setAttribute("font-size", "13");
      centerSub.setAttribute("font-weight", "700");
      centerSub.setAttribute("text-anchor", "middle");
      centerSub.setAttribute("id", "centerHover");
      centerSub.textContent = state.hoveredState || "";
      svg.appendChild(centerSub);

      const centerMeta = document.createElementNS(ns, "text");
      centerMeta.setAttribute("x", cx);
      centerMeta.setAttribute("y", cy + 48);
      centerMeta.setAttribute("fill", "rgba(181, 224, 243, 0.92)");
      centerMeta.setAttribute("font-size", "11");
      centerMeta.setAttribute("text-anchor", "middle");
      centerMeta.setAttribute("id", "centerMeta");
      const selectedVal = state.dataByState[state.selectedState]?.["Total population"]?.[state.mode];
      centerMeta.textContent = `${state.selectedState} · ${formatCompact("int", selectedVal)}`;
      svg.appendChild(centerMeta);

      const footer = document.createElementNS(ns, "text");
      footer.setAttribute("x", cx);
      footer.setAttribute("y", 538);
      footer.setAttribute("text-anchor", "middle");
      footer.setAttribute("fill", "rgba(214, 252, 255, 0.9)");
      footer.setAttribute("font-size", "11");
      footer.setAttribute("letter-spacing", "0.18em");
      footer.setAttribute("font-weight", "700");
      footer.textContent = "AMERICAN COMMUNITY SURVEY";
      svg.appendChild(footer);

      const source = document.createElementNS(ns, "text");
      source.setAttribute("x", cx);
      source.setAttribute("y", 553);
      source.setAttribute("text-anchor", "middle");
      source.setAttribute("fill", "rgba(155, 198, 219, 0.88)");
      source.setAttribute("font-size", "9");
      source.setAttribute("letter-spacing", "0.04em");
      source.textContent = "Source: U.S. Census Bureau, 2024 ACS 1-year estimates";
      svg.appendChild(source);
    }

    function renderMap() {
      const svg = el.mapSvg;
      const ns = "http://www.w3.org/2000/svg";
      svg.innerHTML = "";
      const states = state.states.filter((s) => s !== "United States");
      const values = states.map((s) => state.dataByState[s]?.["Total population"]?.[state.mode] || 0);
      const minValue = Math.min(...values);
      const maxValue = Math.max(...values);
      const spread = Math.max(1, maxValue - minValue);

      if (state.usGeoFeatures && window.d3 && window.topojson) {
        try {
          const geo = state.usGeoFeatures.filter((f) => FIPS_TO_STATE[String(f.id).padStart(2, "0")]);
          if (geo.length > 0) {
            const fc = { type: "FeatureCollection", features: geo };
            const projection = d3.geoAlbersUsa().fitExtent([[12, 66], [548, 506]], fc);
            const pathGen = d3.geoPath(projection);

            const panel = document.createElementNS(ns, "rect");
            panel.setAttribute("x", "12");
            panel.setAttribute("y", "66");
            panel.setAttribute("width", "536");
            panel.setAttribute("height", "440");
            panel.setAttribute("rx", "16");
            panel.setAttribute("fill", "rgba(7, 22, 38, 0.45)");
            panel.setAttribute("stroke", "rgba(114,206,255,0.22)");
            svg.appendChild(panel);

            geo.forEach((feature) => {
              const fips = String(feature.id).padStart(2, "0");
              const name = FIPS_TO_STATE[fips];
              if (!name || !state.dataByState[name]) return;

              const value = state.dataByState[name]?.["Total population"]?.[state.mode] || 0;
              const p = (value - minValue) / spread;
              const isActive = name === state.selectedState;
              const isAlabama = name === "Alabama";
              const hue = state.mode === "asian" ? 44 : 194;
              const sat = 56 + p * 34;
              const light = 26 + p * 34;

              const d = document.createElementNS(ns, "path");
              d.setAttribute("d", pathGen(feature) || "");
              d.setAttribute("fill", isAlabama ? "hsla(2, 96%, 42%, 0.82)" : `hsla(${hue}, ${sat}%, ${light}%, 0.86)`);
              d.setAttribute("stroke", isAlabama ? "rgba(255,108,108,1)" : (isActive ? "rgba(230,252,255,1)" : "rgba(140,220,255,0.65)"));
              d.setAttribute("stroke-width", isAlabama ? "1.8" : (isActive ? "1.6" : "0.8"));
              d.style.cursor = "pointer";
              d.style.filter = isAlabama
                ? "drop-shadow(0 0 10px rgba(255,78,78,0.95))"
                : (isActive ? "drop-shadow(0 0 9px rgba(176,244,255,0.95))" : "drop-shadow(0 0 3px rgba(80,220,255,0.45))");
              if (isActive) {
                const c = pathGen.centroid(feature);
                if (Array.isArray(c) && Number.isFinite(c[0]) && Number.isFinite(c[1])) {
                  d.setAttribute("transform", `translate(${c[0]} ${c[1]}) scale(1.035) translate(${-c[0]} ${-c[1]})`);
                }
              }
              d.addEventListener("click", () => selectState(name, false));
              d.addEventListener("mouseenter", (event) => {
                state.hoveredState = name;
                updateCenterTexts();
                showMapTooltip(name, value, event);
              });
              d.addEventListener("mousemove", (event) => {
                moveMapTooltip(event);
              });
              d.addEventListener("mouseleave", () => {
                state.hoveredState = null;
                updateCenterTexts();
                hideMapTooltip();
              });
              svg.appendChild(d);
            });
            const footer = document.createElementNS(ns, "text");
            footer.setAttribute("x", 280);
            footer.setAttribute("y", 538);
            footer.setAttribute("text-anchor", "middle");
            footer.setAttribute("fill", "rgba(214, 252, 255, 0.9)");
            footer.setAttribute("font-size", "11");
            footer.setAttribute("letter-spacing", "0.18em");
            footer.setAttribute("font-weight", "700");
            footer.textContent = "AMERICAN COMMUNITY SURVEY";
            svg.appendChild(footer);

            const source = document.createElementNS(ns, "text");
            source.setAttribute("x", 280);
            source.setAttribute("y", 553);
            source.setAttribute("text-anchor", "middle");
            source.setAttribute("fill", "rgba(155, 198, 219, 0.88)");
            source.setAttribute("font-size", "9");
            source.setAttribute("letter-spacing", "0.04em");
            source.textContent = "Source: U.S. Census Bureau, 2024 ACS 1-year estimates";
            svg.appendChild(source);

            return;
          }
        } catch (e) {
          // If geo map render fails, continue to tile-map fallback below.
        }
      }

      const tileW = 34;
      const tileH = 30;
      const gap = 6;
      const originX = 24;
      const originY = 80;

      const panel = document.createElementNS(ns, "rect");
      panel.setAttribute("x", "12");
      panel.setAttribute("y", "66");
      panel.setAttribute("width", "536");
      panel.setAttribute("height", "440");
      panel.setAttribute("rx", "16");
      panel.setAttribute("fill", "rgba(7, 22, 38, 0.45)");
      panel.setAttribute("stroke", "rgba(114,206,255,0.22)");
      svg.appendChild(panel);

      states.forEach((name) => {
        const abbr = getStateAbbreviation(name);
        const pos = TILE_POSITIONS[abbr];
        if (!pos) return;
        const x = originX + pos[0] * (tileW + gap);
        const y = originY + pos[1] * (tileH + gap);
        const value = state.dataByState[name]?.["Total population"]?.[state.mode] || 0;
        const p = (value - minValue) / spread;
        const isActive = name === state.selectedState;
        const isAlabama = name === "Alabama";
        const hue = state.mode === "asian" ? 44 : 194;
        const sat = 56 + p * 34;
        const light = 26 + p * 34;

        const r = document.createElementNS(ns, "rect");
        r.setAttribute("x", x.toString());
        r.setAttribute("y", y.toString());
        r.setAttribute("width", tileW.toString());
        r.setAttribute("height", tileH.toString());
        r.setAttribute("rx", "6");
        r.setAttribute("fill", isAlabama ? "hsla(2, 96%, 42%, 0.8)" : `hsla(${hue}, ${sat}%, ${light}%, 0.82)`);
        r.setAttribute("stroke", isAlabama ? "rgba(255,108,108,1)" : (isActive ? "rgba(230,252,255,1)" : "rgba(140,220,255,0.7)"));
        r.setAttribute("stroke-width", isAlabama ? "2.8" : (isActive ? "2.4" : "1"));
        r.style.cursor = "pointer";
        r.style.filter = isAlabama
          ? "drop-shadow(0 0 12px rgba(255,78,78,0.95))"
          : (isActive ? "drop-shadow(0 0 10px rgba(176,244,255,0.95))" : "drop-shadow(0 0 4px rgba(80,220,255,0.5))");
        if (isActive) {
          r.setAttribute("transform", `translate(${tileW * -0.017}, ${tileH * -0.017}) scale(1.035)`);
        }
        r.addEventListener("click", () => selectState(name, false));
        r.addEventListener("mouseenter", (event) => {
          state.hoveredState = name;
          updateCenterTexts();
          showMapTooltip(name, value, event);
        });
        r.addEventListener("mousemove", (event) => {
          moveMapTooltip(event);
        });
        r.addEventListener("mouseleave", () => {
          state.hoveredState = null;
          updateCenterTexts();
          hideMapTooltip();
        });
        svg.appendChild(r);

        const t = document.createElementNS(ns, "text");
        t.setAttribute("x", (x + tileW / 2).toString());
        t.setAttribute("y", (y + tileH / 2 + 1).toString());
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("dominant-baseline", "middle");
        t.setAttribute("font-size", "11");
        t.setAttribute("font-family", "Consolas, 'Courier New', monospace");
        t.setAttribute("font-weight", "700");
        t.setAttribute("fill", "rgba(235,252,255,0.98)");
        t.style.pointerEvents = "none";
        t.textContent = abbr;
        svg.appendChild(t);
      });

      const footer = document.createElementNS(ns, "text");
      footer.setAttribute("x", 280);
      footer.setAttribute("y", 538);
      footer.setAttribute("text-anchor", "middle");
      footer.setAttribute("fill", "rgba(214, 252, 255, 0.9)");
      footer.setAttribute("font-size", "11");
      footer.setAttribute("letter-spacing", "0.18em");
      footer.setAttribute("font-weight", "700");
      footer.textContent = "AMERICAN COMMUNITY SURVEY";
      svg.appendChild(footer);

      const source = document.createElementNS(ns, "text");
      source.setAttribute("x", 280);
      source.setAttribute("y", 553);
      source.setAttribute("text-anchor", "middle");
      source.setAttribute("fill", "rgba(155, 198, 219, 0.88)");
      source.setAttribute("font-size", "9");
      source.setAttribute("letter-spacing", "0.04em");
      source.textContent = "Source: U.S. Census Bureau, 2024 ACS 1-year estimates";
      svg.appendChild(source);
    }

    function renderActiveView() {
      const isWheel = state.view === "wheel";
      hideMapTooltip();
      el.wheelSvg.style.opacity = "0";
      el.mapSvg.style.opacity = "0";
      el.wheelSvg.style.display = isWheel ? "block" : "none";
      el.mapSvg.style.display = isWheel ? "none" : "block";
      el.viewHint.textContent = isWheel ? "Click arc to inspect" : "Click state tile to inspect";
      if (isWheel) {
        renderWheel();
      } else {
        el.wheelTitle.textContent = `US STATE MAP / Data Linked (${state.mode === "asian" ? "Asian" : "Total"})`;
        renderMap();
      }
      requestAnimationFrame(() => {
        if (isWheel) el.wheelSvg.style.opacity = "1";
        else el.mapSvg.style.opacity = "1";
      });
    }

    function updateViewToggleUI() {
      [...el.viewToggle.querySelectorAll("button")].forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.view === state.view);
      });
    }

    function animateNumber(node, from, to, type, duration = 700) {
      const start = performance.now();
      function frame(now) {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        const val = from + (to - from) * eased;
        node.textContent = formatValue(type, val);
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function renderDetail() {
      const st = state.selectedState;
      const row = state.dataByState[st] || {};

      const cards = METRICS.map((m) => {
        const value = row[m.key]?.[state.mode];
        const us = state.dataByState["United States"]?.[m.key]?.[state.mode];
        return { ...m, value, delta: Number.isFinite(value) && Number.isFinite(us) ? value - us : NaN };
      });

      el.stats.innerHTML = "";
      cards.forEach((c) => {
        const card = document.createElement("div");
        card.className = "card";
        let badgeClass = "badge-near";
        let badgeText = "Near US Avg";
        if (Number.isFinite(c.delta)) {
          if (Math.abs(c.delta) < (c.type === "percent" ? 1 : c.type === "float1" ? 1.2 : 1500)) {
            badgeClass = "badge-near";
            badgeText = "Near US Avg";
          } else if (c.delta > 0) {
            badgeClass = "badge-high";
            badgeText = "Above US";
          } else {
            badgeClass = "badge-low";
            badgeText = "Below US";
          }
        }
        card.innerHTML = `
          <div class="label">${c.label}</div>
          <div class="value">-</div>
          <div class="delta">${Number.isFinite(c.delta) ? "vs US " + (c.delta > 0 ? "+" : "") + formatValue(c.type, c.delta) : ""}</div>
          <div class="badge ${badgeClass}">${badgeText}</div>
        `;
        el.stats.appendChild(card);
        const valueNode = card.querySelector(".value");
        const from = Number(String(valueNode.dataset.prev || "0")) || 0;
        const to = Number.isFinite(c.value) ? c.value : 0;
        valueNode.dataset.prev = String(to);
        animateNumber(valueNode, from, to, c.type);
      });
    }

    function renderUSStats() {
      const usRow = state.dataByState["United States"] || {};
      el.usStats.innerHTML = "";
      METRICS.forEach((m) => {
        const value = usRow[m.key]?.[state.mode];
        const card = document.createElement("div");
        card.className = "card us-card";
        card.innerHTML = `
          <div class="label">${m.label}</div>
          <div class="value">${formatValue(m.type, value)}</div>
        `;
        el.usStats.appendChild(card);
      });
    }

    function renderStateOptions() {
      el.stateSelect.innerHTML = "";
      state.states.filter((s) => s !== "United States").forEach((s) => {
        const o = document.createElement("option");
        o.value = s;
        o.textContent = s;
        el.stateSelect.appendChild(o);
      });
      if (!state.states.includes(state.selectedState)) {
        state.selectedState = state.states.find((s) => s !== "United States") || state.states[0];
      }
      el.stateSelect.value = state.selectedState;
    }

    function updateToggleUI() {
      const toAsian = state.mode === "asian";
      el.pill.style.transform = toAsian ? "translateX(100%)" : "translateX(0)";
      [...el.toggle.querySelectorAll("button")].forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.group === state.mode);
      });
    }

    async function loadCsvText() {
      try {
        const res = await fetch("./wheel data.csv");
        if (!res.ok) throw new Error("fetch failed");
        return await res.text();
      } catch (e) {
        return fallbackCsv;
      }
    }

    function bindEvents() {
      el.toggle.addEventListener("click", (ev) => {
        const btn = ev.target.closest("button[data-group]");
        if (!btn) return;
        state.mode = btn.dataset.group;
        updateToggleUI();
        updateScaleLegend();
        renderActiveView();
        renderUSStats();
        renderDetail();
      });

      el.viewToggle.addEventListener("click", (ev) => {
        const btn = ev.target.closest("button[data-view]");
        if (!btn) return;
        state.view = btn.dataset.view;
        updateViewToggleUI();
        renderActiveView();
      });

      el.stateSelect.addEventListener("change", () => {
        selectState(el.stateSelect.value, true);
      });
    }

    async function init() {
      const text = await loadCsvText();
      const rows = parseCSV(text);
      state.dataByState = buildData(rows);
      state.states = Object.keys(state.dataByState);
      try {
        if (window.d3 && window.topojson) {
          const res = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json");
          if (res.ok) {
            const topo = await res.json();
            const geo = topojson.feature(topo, topo.objects.states);
            state.usGeoFeatures = geo.features || null;
          }
        }
      } catch (e) {
        state.usGeoFeatures = null;
      }
      renderStateOptions();
      bindEvents();
      updateToggleUI();
      updateViewToggleUI();
      updateScaleLegend();
      // Ensure AL is the default reference panel on first load.
      if (state.states.includes("Alabama")) state.selectedState = "Alabama";
      renderActiveView();
      renderUSStats();
      renderDetail();
    }

    init();
  </script>
</body>
</html>
